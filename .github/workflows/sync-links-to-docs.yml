name: Sync links to docs

on:
  push:
    branches: ["main"]
    paths:
      - "sources/links.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync file
        run: |
          mkdir -p docs
          cp sources/links.md docs/index.md

      - name: Commit changes
        run: |
          if git diff --quiet -- docs/index.md; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.md
          git commit -m "Auto-sync docs/index.md from sources/links.md"
          git push
