name: Publish Hugo Prototype to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "web/hugo-prototype/**"
      - "results/Produktbeskrivelser/**"
      - "arkitektur/**"
      - "config/prompts/**"
      - "config/templates/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.125.7"
          extended: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate product-capability master map
        run: |
          python web/hugo-prototype/scripts/generate-product-capability-map.py

      - name: Regenerate capability pages
        run: |
          python web/hugo-prototype/scripts/generate-capabilities.py

      - name: Regenerate product pages
        shell: pwsh
        run: |
          ./web/hugo-prototype/scripts/generate-products.ps1

      - name: Build prototype
        run: |
          hugo --source web/hugo-prototype --destination public --gc --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/hugo-prototype/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
